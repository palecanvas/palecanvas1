<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaleCanvas - Paylaşım Platformu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Hızlı önizleme için temel düzen */
        .page { display: none; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal.open { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; color: black; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; }
        .toast.show { display: block; }
        input, textarea, select { width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="app">
        <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 10px; border-top: 1px solid #ddd;">
            <div onclick="showPage('feed')">🏠</div>
            <div onclick="showPage('explore')">🔍</div>
            <div onclick="openShare()" style="background: #007bff; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">+</div>
            <div onclick="showPage('profile')">👤</div>
            <div onclick="showPage('settings')">⚙️</div>
        </nav>

        <main style="padding-bottom: 70px;">
            <section id="feedPage" class="page active">
                <header style="padding: 20px; text-align: center;"><h2>PaleCanvas</h2></header>
                <div id="feedContainer" style="padding: 10px;">
                    <p style="text-align: center; color: #666;">Henüz bir paylaşım yok. İlk adımı sen at!</p>
                </div>
            </section>

            <section id="explorePage" class="page" style="padding: 20px;"><h2>Keşfet</h2></section>
            <section id="profilePage" class="page" style="padding: 20px;"><h2>Profilim</h2></section>
            <section id="settingsPage" class="page" style="padding: 20px;"><h2>Ayarlar</h2></section>
        </main>

        <div id="shareModal" class="modal">
            <div class="modal-content">
                <h3 style="margin-top: 0;">Yeni Paylaşım</h3>
                <input type="text" id="postTitle" placeholder="Başlık...">
                <textarea id="postDesc" placeholder="Açıklama..." rows="3"></textarea>
                <select id="postType">
                    <option value="genel">Genel</option>
                    <option value="yazilim">Yazılım</option>
                    <option value="sanat">Sanat</option>
                </select>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button onclick="closeShare()" style="background: #eee; border: none; padding: 10px; border-radius: 5px;">İptal</button>
                    <button onclick="createPost()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Paylaş</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast">İşlem başarılı!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId + 'Page');
            if(target) target.classList.add('active');
        }

        function openShare() { document.getElementById('shareModal').classList.add('open'); }
        function closeShare() { document.getElementById('shareModal').classList.remove('open'); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>

    <script src="script.js"></script>

</body>
</html>
